<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Login - Goal Tracker</title>

<style>

/* Background */

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
overflow:hidden;
}

/* Animated gradient */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Tech grid background */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-2;
}

/* Particle canvas */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* Login card */

.login-card{
width:340px;
padding:35px;
border-radius:14px;
background:rgba(30,41,59,0.7);
backdrop-filter:blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
color:white;
border:1px solid rgba(255,255,255,0.08);
}

/* Title */

.login-card h2{
margin-bottom:5px;
}

/* Welcome text */

#welcomeMsg{
color:#22c55e;
margin-bottom:10px;
min-height:24px;
}

/* Input */

.login-card input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
outline:none;
background:#1e293b;
color:white;
transition:0.2s;
}

/* Input focus */

.login-card input:focus{
box-shadow:0 0 6px #22c55e;
}

/* Button */

.login-card button{
width:100%;
margin-top:18px;
padding:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-card button:hover{
background:#16a34a;
}

/* Spinner */

.spinner{
width:28px;
height:28px;
border:4px solid #334155;
border-top:4px solid #22c55e;
border-radius:50%;
margin:15px auto;
display:none;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="login-card">

<h2>🎯 Goal Tracker</h2>

<h3 id="welcomeMsg"></h3>

<p>Enter your nickname</p>

<input
id="nickname"
placeholder="Your nickname"
oninput="updateWelcome()">

<button onclick="login()">Login</button>

<div id="spinner" class="spinner"></div>

</div>

<script>

/* Typing welcome animation */

const text = "Welcome to Goal Tracker...";
let index = 0;

function typeText(){

if(index < text.length){

document.getElementById("welcomeMsg").innerHTML += text.charAt(index);

index++;

setTimeout(typeText,70);

}

}

typeText();



/* Dynamic welcome message */

function updateWelcome(){

let name=document.getElementById("nickname").value;

if(name.length>0){
document.getElementById("welcomeMsg").innerText =
"Welcome, "+name+" 👋";
}

}



/* Login function */

function login(){

let name=document.getElementById("nickname").value.trim();

if(name===""){
alert("Enter nickname");
return;
}

localStorage.setItem("nickname",name);

document.getElementById("spinner").style.display="block";

setTimeout(()=>{
window.location.href="index.html";
},1000);

}



/* Particle sprinkle animation */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3,
speedX:(Math.random()-0.5),
speedY:(Math.random()-0.5)
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.speedX;
p.y+=p.speedY;

if(p.x<0||p.x>canvas.width) p.speedX*=-1;
if(p.y<0||p.y>canvas.height) p.speedY*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

/* Glow effect */

ctx.shadowBlur=10;
ctx.shadowColor="#22c55e";

ctx.fillStyle="#22c55e";
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
